<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement - FLOWERS.AE</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1>Plantes Ornementales <br> Made in DRC</h1>
    <nav>
      <a href="/">Retour à l'accueil</a>
    </nav>
  </header>

  <div class="checkout-container" style="padding: 20px; max-width: 600px; margin: 0 auto;">
    <h2>Finaliser la commande</h2>
    <p><strong>Produit choisi :</strong> {{ produit }}</p>
    <p><strong>Prix à payer :</strong> {{ prix }}$</p>

    <form id="payment-form" action="#" method="POST">
      <fieldset>
        <legend>Informations de livraison</legend>
        <label for="name">Nom complet :</label><br>
        <input type="text" id="name" required><br><br>
        
        <label for="address">Adresse de livraison :</label><br>
        <input type="text" id="address" required><br><br>
        
        <label for="phone">Téléphone :</label><br>
        <input type="tel" id="phone" required><br><br>
      </fieldset>
      
      <fieldset>
        <legend>Paiement</legend>
        <p><em><!-- INSÈRE TON API DE PAIEMENT ICI (Stripe, FlexPay, Maxicash...) --></em></p>
      </fieldset>

      <button type="submit">Payer {{ prix }}$</button>
    </form>
  </div>
</body>
</html>
